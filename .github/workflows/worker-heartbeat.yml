name: Worker Heartbeat

on:
  repository_dispatch:
    types: [worker-heartbeat]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: worker-heartbeat
  cancel-in-progress: false

jobs:
  update-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update notification timestamps
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'data/notifications.json';
          const now = new Date().toISOString();

          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          data.lastChecked = now;
          data.lastUpdated = now;
          if (typeof data.count !== 'number') {
            data.count = Array.isArray(data.notifications) ? data.notifications.length : 0;
          }
          fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          NODE

      - name: Commit and push heartbeat timestamp
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/notifications.json
          git diff --staged --quiet || git commit -m "chore: worker heartbeat timestamp - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

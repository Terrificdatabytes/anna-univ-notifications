name: Fetch Notifications

on:
  # Manual trigger or first launch
  workflow_dispatch:
    inputs:
      chain_run:
        description: 'Chain run number (auto-incremented — do not set manually)'
        required: false
        default: '1'
        type: string
  # Failsafe: if the chain ever breaks (e.g. GitHub outage), this restarts it.
  # Every 5 min (GitHub minimum) limits the max gap to ~5 min instead of ~60 min.
  # The concurrency group cancels any queued cron run when the chain dispatches,
  # so there are no duplicate runs while the chain is healthy.
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes — only fires if no chain is running

# Prevent overlapping runs from committing conflicting data
concurrency:
  group: fetch-notifications
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # 65 min ceiling — loop exits at 55 min, leaving time to chain before GitHub kills the job
    timeout-minutes: 65
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Display run info
        run: |
          echo "================================================"
          echo "CHAIN RUN : ${{ inputs.chain_run || '(scheduled)' }}"
          echo "START TIME: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "================================================"

      - name: Install scraper dependencies
        run: cd scraper && npm install

      - name: Install scripts dependencies
        run: cd scripts && npm install

      # ──────────────────────────────────────────────────────────────────────────
      # MAIN LOOP — polls coe.annauniv.edu every 60 s for 55 minutes.
      # Stops at 55 min so the chaining step can fire before GitHub's 65-min limit.
      # ──────────────────────────────────────────────────────────────────────────
      - name: Continuous scrape loop (55 min × 60 s)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          LOOP_DURATION=3300   # 55 minutes
          POLL_INTERVAL=60     # seconds between polls
          START_TS=$(date +%s)
          ITERATION=0

          # Seed the "old" state from whatever is already committed
          if [ -f data/notifications.json ]; then
            cp data/notifications.json data/notifications.json.old
          else
            echo '{"notifications":[],"lastUpdated":"","count":0}' > data/notifications.json.old
          fi

          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo "Loop started. Will poll every ${POLL_INTERVAL}s for ${LOOP_DURATION}s total."

          while true; do
            NOW=$(date +%s)
            ELAPSED=$(( NOW - START_TS ))

            if [ "$ELAPSED" -ge "$LOOP_DURATION" ]; then
              echo "⏱ 55-minute window reached — exiting loop."
              break
            fi

            ITERATION=$(( ITERATION + 1 ))
            echo ""
            echo "────────────────────────────────────────────────"
            echo "Iteration #${ITERATION} | Elapsed: ${ELAPSED}s | $(date -u '+%H:%M:%S UTC')"
            echo "────────────────────────────────────────────────"

            # ── Run the scraper ────────────────────────────────────────────────
            (cd scraper && npm start)

            # ── Detect new notifications by ID comparison ──────────────────────
            OLD_IDS=$(jq -r '.notifications[].id' data/notifications.json.old 2>/dev/null | sort -u || echo "")
            NEW_IDS=$(jq -r '.notifications[].id' data/notifications.json 2>/dev/null | sort -u || echo "")
            NEW_NOTIFICATION_IDS=$(comm -23 <(echo "$NEW_IDS") <(echo "$OLD_IDS"))

            if [ -n "$NEW_NOTIFICATION_IDS" ]; then
              NEW_COUNT=$(echo "$NEW_NOTIFICATION_IDS" | grep -c .)
              FIRST_ID=$(echo "$NEW_NOTIFICATION_IDS" | head -n 1)
              FIRST_TITLE=$(jq -r --arg id "$FIRST_ID" \
                '.notifications[] | select(.id == $id) | .title' \
                data/notifications.json | head -n 1)

              echo "🔔 ${NEW_COUNT} new notification(s) detected!"
              echo "   First: ${FIRST_TITLE}"

              # Send Firebase push notification
              if [ "$NEW_COUNT" -eq "1" ]; then
                node scripts/send-new-notification.js "$FIRST_TITLE" 1
              else
                node scripts/send-new-notification.js "$FIRST_TITLE" "$NEW_COUNT"
              fi
            else
              echo "✓ No new notifications."
            fi

            # ── Commit if data changed ─────────────────────────────────────────
            git add data/notifications.json
            if ! git diff --cached --quiet; then
              git commit -m "Update notifications - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
              # Rebase onto any concurrent pushes, then retry push up to 3 times.
              # Use -X ours so conflicts in notifications.json always resolve to
              # our freshly-scraped version (a full snapshot, not incremental).
              PUSHED=false
              for attempt in 1 2 3; do
                git rebase --abort 2>/dev/null || true
                if git pull --rebase -X ours && git push; then
                  PUSHED=true
                  break
                fi
                echo "   ⚠ Push attempt ${attempt} failed — retrying in 5s…"
                sleep 5
              done
              if [ "$PUSHED" = "true" ]; then
                echo "   ✓ Committed and pushed."
                # Roll forward the baseline for the next iteration
                cp data/notifications.json data/notifications.json.old
              else
                echo "   ✗ Push failed after 3 attempts — will retry next iteration."
                git rebase --abort 2>/dev/null || true
              fi
            fi

            # ── Sleep for remainder of the 60 s window ─────────────────────────
            ITER_ELAPSED=$(( $(date +%s) - NOW ))
            SLEEP_FOR=$(( POLL_INTERVAL - ITER_ELAPSED ))
            if [ "$SLEEP_FOR" -gt 0 ]; then
              echo "   Sleeping ${SLEEP_FOR}s…"
              sleep "$SLEEP_FOR"
            fi
          done

          # Clean up temp file
          rm -f data/notifications.json.old
          echo ""
          echo "Loop complete. Total iterations: ${ITERATION}"

      # ──────────────────────────────────────────────────────────────────────────
      # CHAIN — dispatch the next run before this job ends so there is no gap.
      # The chain_run counter increments each time for easy tracing in the UI.
      # ──────────────────────────────────────────────────────────────────────────
      - name: Trigger next chained run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT="${{ inputs.chain_run || '0' }}"
          # strip non-numeric chars in case the scheduled trigger passes an empty string
          CURRENT=$(echo "$CURRENT" | tr -dc '0-9')
          CURRENT=${CURRENT:-0}
          NEXT=$(( CURRENT + 1 ))

          echo "Dispatching chain run #${NEXT}…"

          HTTP_STATUS=$(curl -s -o /tmp/gh_resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fetch-notifications.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"chain_run\":\"${NEXT}\"}}")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "✓ Chain run #${NEXT} dispatched successfully."
          else
            echo "⚠ Dispatch returned HTTP ${HTTP_STATUS}:"
            cat /tmp/gh_resp.json
            echo ""
            echo "The hourly schedule cron will restart the chain automatically."
          fi

      - name: Summary
        run: |
          echo "================================================"
          echo "RUN COMPLETE"
          echo "End time : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Next run : chain_run=$(( ${{ inputs.chain_run || 0 }} + 1 ))"
          echo "================================================"
          jq '{count:.count, lastUpdated:.lastUpdated, latest:.notifications[0].title}' \
            data/notifications.json 2>/dev/null || echo "(no data)"

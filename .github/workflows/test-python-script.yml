name: Test Python Script Secret

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — decode & syntax-check only, skip live execution'
        required: false
        default: false
        type: boolean

jobs:
  test-python-script:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      # ── Decode the gzip-compressed, base64-encoded secret ──────────────────
      - name: Restore private Python script from secret
        env:
          PYTHON_SCRIPT: ${{ secrets.PYTHON_SCRIPT }}
        run: |
          echo "Decoding PYTHON_SCRIPT secret…"
          echo "$PYTHON_SCRIPT" | base64 -d | gunzip > scripts/process_notification.py
          echo "✓ Decoded successfully ($(wc -c < scripts/process_notification.py) bytes)"

      # ── Download CNN model (required by process_notification.py) ──────────
      - name: Download CNN model
        run: |
          wget "https://huggingface.co/TDB001/COE-SCRAPPER-CNN/resolve/main/anna_cnn_v2.keras?download=true" \
            -O scripts/anna_cnn_v2.keras

      # ── Syntax-check decoded script ────────────────────────────────────────
      - name: Syntax-check decoded script
        run: |
          python3 -m py_compile scripts/process_notification.py
          echo "✓ Syntax OK"

      # ── Optionally run the script against current notification data ────────
      - name: Run scraper script
        if: ${{ !inputs.dry_run }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "Running process_notification.py..."
          python3 scripts/process_notification.py
          echo "✓ Script completed successfully"

      # ── Upload CSV files as one artifact ──────────────────────────────────
      - name: Upload CSV artifacts
        if: ${{ !inputs.dry_run && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: csv-output
          path: |
            anna_results.csv
            anna_summary_*.csv
            students.csv
          if-no-files-found: warn

      # ── Upload result HTML pages folder as one artifact ───────────────────
      - name: Upload result pages
        if: ${{ !inputs.dry_run && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: result-pages
          path: result_pages/
          if-no-files-found: warn

      - name: Summary
        run: |
          echo "================================================"
          echo "TEST COMPLETE"
          echo "Dry run : ${{ inputs.dry_run }}"
          echo "================================================"
